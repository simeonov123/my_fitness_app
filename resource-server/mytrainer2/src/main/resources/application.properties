spring.application.name=mytrainer2

# -- DataSource settings----------------------------------------------------
# Local default works from IDE; Docker/production should override via env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/myfitness?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fitness_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:userpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -- Disable Hibernate auto-DDL; Liquibase manages the schema
spring.jpa.hibernate.ddl-auto=none

# -- Liquibase changelog location
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ----------------------------------------------------------------
# OAuth2 Resource Server / JWT configuration
# ----------------------------------------------------------------

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/myrealm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/myrealm/protocol/openid-connect/certs}
app.security.allowed-issuers=${KEYCLOAK_ALLOWED_ISSUERS:http://localhost:8081/realms/myrealm,http://10.0.2.2:8081/realms/myrealm}
# ----------------------------------------------------------------
