services:

  mysql:
    image: mysql:8
    container_name: my_fitness_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-myfitness}
      MYSQL_USER: ${MYSQL_USER:-fitness_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-userpass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    build:
      context: ./keycloak
    image: my_fitness_keycloak:latest
    container_name: my_fitness_keycloak
    depends_on:
      - mysql
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-adminpass}
      # DB Settings
      KC_DB: mysql
      KC_DB_URL_HOST: mysql
      KC_DB_URL_PORT: 3306
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-keycloak_user}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloakpass}

      # ── FOR LOCAL TESTING ON EMULATOR ────────────────────────────────────────────
      # KC_HOSTNAME_PORT: 8081

      # -- keep KC_HOSTNAME_STRICT *false* so KC accepts both hosts
      KC_HOSTNAME_STRICT: "false"

      # -- local dev over HTTP (no TLS reverse proxy)
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_RELATIVE_PATH: "/"
      
    # Mount your SPI listener into the providers folder
    volumes:
      - ./db:/opt/keycloak/data/import
    command: >
      start-dev --http-port=${KEYCLOAK_HTTP_PORT:-8081}
    ports:
      - "${KEYCLOAK_HOST_PORT:-8081}:${KEYCLOAK_HTTP_PORT:-8081}"
    restart: unless-stopped


  resource-server:
    build:
      context: ./resource-server
      dockerfile: Dockerfile
    container_name: my_fitness_resource
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/myfitness}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-fitness_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-userpass}
      KEYCLOAK_AUTH_URL: ${KEYCLOAK_INTERNAL_REALM_URL:-http://keycloak:8081/realms/myrealm}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-https://auth.example.com/realms/myrealm}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:8081/realms/myrealm/protocol/openid-connect/certs}
      KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-https://auth.example.com/realms/myrealm}
      APP_CLIENT_INVITE_BASE_URL: ${APP_CLIENT_INVITE_BASE_URL:-mytrainer://invite/client}
      APP_CLIENT_WEB_INVITE_BASE_URL: ${APP_CLIENT_WEB_INVITE_BASE_URL:-https://app.example.com/onboard/client}
      # SPRING_LIQUIBASE_CLEAR_CHECKSUMS: "true"
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "${RESOURCE_SERVER_HOST_PORT:-8080}:8080"
      - "${RESOURCE_SERVER_DEBUG_PORT:-5005}:5005"
    restart: unless-stopped
    command: >
      java
        -agentlib:jdwp=transport=dt_socket,address=*:5005,server=y,suspend=n
        -jar app.jar

  flutter-client:
    build:
      context: ./flutter-client
      dockerfile: Dockerfile
    container_name: my_fitness_flutter
    depends_on:
      - resource-server
    ports:
      - "${FLUTTER_HOST_PORT:-80}:80"
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: my_fitness_adminer
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${ADMINER_HOST_PORT:-8082}:8080"
    restart: unless-stopped

volumes:
  mysql_data:
